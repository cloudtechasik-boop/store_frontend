<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CloudTech logo">
  <defs>
    <linearGradient id="ct-tile" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="ct-laptop" x1="10" y1="12" x2="38" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" />
      <stop offset="1" stop-color="#ede9fe" />
    </linearGradient>
  </defs>

  <!-- Rounded gradient tile -->
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#ct-tile)" />
  <rect x="2" y="2" width="44" height="22" rx="12" fill="#ffffff" opacity="0.12" />

  <!-- Laptop screen -->
  <rect x="13" y="12" width="22" height="15" rx="2.5" fill="url(#ct-laptop)" />
  <rect x="16" y="15" width="16" height="9" rx="1" fill="#6d28d9" />

  <!-- Laptop base -->
  <path
    d="M9 31h30l1.6 3.2a1.5 1.5 0 0 1-1.34 2.17H8.74A1.5 1.5 0 0 1 7.4 34.2L9 31Z"
    fill="url(#ct-laptop)"
  />
</svg>
